    <h1>Atlas ptaków</h1>
    
    <figure>
        <a href="https://pl.wikipedia.org/wiki/Gil_zwyczajny" target="_blank"><img src="../obrazy/gil.jfif" alt="Gil"/></a>
        <br/>
        <audio controls="controls" loop="loop"><source src="../dzwieki/gil.mp3" type="audio/mpeg"/></audio>
        <figcaption>
            <strong>Gil zwyczajny, gil (Pyrrhula pyrrhula)</strong> – gatunek małego ptaka z rodziny łuszczakowatych (Fringillidae), zamieszkujący Eurazję. Nie jest zagrożony.
        </figcaption>
    </figure>
    <figure>
        <a href="https://pl.wikipedia.org/wiki/Dymówka" target="_blank"><img src="../obrazy/jaskolka.jfif" alt="Jaskółka"/></a>
        <br/>
        <audio controls="controls" loop="loop"><source src="../dzwieki/gil.mp3" type="audio/mpeg"/></audio>
        <figcaption>
            <strong>Dymówka, jaskółka dymówka (Hirundo rustica)</strong> – gatunek niewielkiego ptaka wędrownego z rodziny jaskółkowatych (Hirundinidae).
        </figcaption>
    </figure>
    <figure>
        <a href="https://pl.wikipedia.org/wiki/Szpak_zwyczajny" target="_blank"><img src="../obrazy/szpak.jfif" alt="Szpak"/></a>
        <br/>
        <audio controls="controls" loop="loop"><source src="../dzwieki/gil.mp3" type="audio/mpeg"/></audio>
        <figcaption>
            <strong>Szpak zwyczajny, szpak (Sturnus vulgaris)</strong> – gatunek średniej wielkości ptaka z rodziny szpakowatych (Sturnidae). Częściowo wędrowny. Pierwotnie zamieszkiwał wyłącznie Eurazję. Nie jest zagrożony wyginięciem.
        </figcaption>
    </figure>
    <figure>
        <a href="https://pl.wikipedia.org/wiki/Drozd_śpiewak" target="_blank"><img src="../obrazy/spiewak.jfif" alt="Śpiewak"/></a>
        <br/>
        <audio controls="controls" loop="loop"><source src="../dzwieki/gil.mp3" type="audio/mpeg"/></audio>
        <figcaption>
            <strong>Drozd śpiewak, śpiewak (Turdus philomelos)</strong> – gatunek średniej wielkości ptaka z rodziny drozdowatych (Turdidae), zamieszkującego Eurazję.
        </figcaption>
    </figure>
    <figure>
        <a href="https://pl.wikipedia.org/wiki/Wilga_złotogrzbieta" target="_blank"><img src="../obrazy/wilga.jfif" alt="Wilga"/></a>
        <br/>
        <audio controls="controls" loop="loop"><source src="../dzwieki/gil.mp3" type="audio/mpeg"/></audio>
        <figcaption>
            <strong>Wilga złotogrzbieta (Oriolus xanthornus)</strong> – gatunek średniej wielkości ptaka z rodziny wilgowatych (Oriolidae), zamieszkujący południową i południowo-wschodnią Azję. Nie jest zagrożony wyginięciem.
        </figcaption>
    </figure>
